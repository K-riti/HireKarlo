# Render Blueprint - HireKarlo Platform
# https://render.com/docs/blueprint-spec
# Using 100% FREE AI services: Groq (Llama 3) + HuggingFace

services:
  # Backend API
  - type: web
    name: hirekarlo-api
    runtime: docker
    dockerfilePath: ./Dockerfile.api
    dockerContext: .
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ASPNETCORE_URLS
        value: http://+:10000
      - key: ConnectionStrings__DefaultConnection
        fromDatabase:
          name: hirekarlo-db
          property: connectionString
      - key: Jwt__Key
        generateValue: true
      - key: Jwt__Issuer
        value: HireKarlo
      - key: Jwt__Audience
        value: HireKarlo
      # FREE AI Services
      - key: Groq__ApiKey
        sync: false  # You'll add this manually (free from groq.com)
      - key: Groq__Model
        value: llama-3.3-70b-versatile
      - key: HuggingFace__ApiKey
        sync: false  # You'll add this manually (free from huggingface.co)
      - key: HuggingFace__Model
        value: sentence-transformers/all-MiniLM-L6-v2
    healthCheckPath: /health
    plan: free

  # Frontend Web App
  - type: web
    name: hirekarlo-web
    runtime: docker
    dockerfilePath: ./Dockerfile.web
    dockerContext: .
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ASPNETCORE_URLS
        value: http://+:10000
      - key: ApiBaseUrl
        fromService:
          name: hirekarlo-api
          type: web
          property: hostport
    plan: free

databases:
  - name: hirekarlo-db
    databaseName: hirekarlo
    plan: free
    postgresMajorVersion: "15"
